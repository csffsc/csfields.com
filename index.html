  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #e8e4dc;
      --ink-muted: #6b6760;
      --ink-faint: #7a7670;
      --paper: #141210;
      --accent: #5c7a4a;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .card {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      opacity: 0;
      transform: translateY(12px);
      animation: arrive 1s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
    }

    @keyframes arrive {
      to { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-family: 'Cormorant Garant', serif;
      font-weight: 300;
      font-size: clamp(3rem, 10vw, 5.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--ink);
    }

    .name em {
      font-style: italic;
      color: var(--accent);
    }

    .rule {
      width: 2rem;
      height: 1px;
      background: var(--ink-faint);
      margin: 2rem auto;
    }

    .bio {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
      line-height: 1.8;
    }

    .contact {
      margin-top: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
    }

    .contact a {
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      color: var(--ink-faint);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .contact a:hover {
      color: var(--ink);
      border-bottom-color: var(--ink-faint);
    }

    .treeline {
      width: 100%;
      display: block;
      flex-shrink: 0;
    }

    .galaxy {
      width: 100%;
      display: block;
      flex-shrink: 0;
      opacity: 0;
      animation: arrive 1.4s cubic-bezier(0.22, 1, 0.36, 1) 0s forwards;
    }
  </style>
